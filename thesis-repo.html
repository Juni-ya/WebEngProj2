<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thesis Repository</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .file-list { margin-top: 20px; }
        .file-item { margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .file-item a { margin-right: 10px; text-decoration: none; color: #007bff; }
        .file-item a:hover { text-decoration: underline; }
        .loading { color: #666; }
        .error { color: #d9534f; }
    </style>
</head>
<body>
    <h1>Thesis Repository</h1>
    <p>This page displays all thesis files from the Google Drive folder.</p>

    <div id="status" class="loading">Loading files...</div>
    <div id="file-list" class="file-list"></div>

    <script>
        // Your Google Drive API credentials
        const API_KEY = 'AIzaSyDxRiYwJW5NvWM06T0sFG-qOLpXmbZT6GM';
        const ROOT_FOLDER_ID = '1FxpX1ExBAEEJcPYwwUe7oHw9i_Lu1Om2';

        // Function to list files from a specific folder
        async function listFiles(folderId) {
            const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}' in parents&key=${API_KEY}&fields=files(id,name,mimeType,webViewLink,webContentLink,thumbnailLink)`;
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            const data = await response.json();
            return data.files;
        }

        // Recursive function to build folder tree
        async function buildFolderTree(folderId, depth = 0) {
            const items = await listFiles(folderId);
            const tree = [];

            for (const item of items) {
                if (item.mimeType === 'application/vnd.google-apps.folder') {
                    const children = depth < 2 ? await buildFolderTree(item.id, depth + 1) : [];
                    tree.push({
                        id: item.id,
                        name: item.name,
                        type: 'folder',
                        children,
                    });
                } else {
                    tree.push({
                        id: item.id,
                        name: item.name,
                        type: 'file',
                        webViewLink: item.webViewLink,
                        webContentLink: item.webContentLink,
                        thumbnailLink: item.thumbnailLink,
                    });
                }
            }

            return tree;
        }

        // Function to display the files
        function displayFiles(tree, container, prefix = '') {
            tree.forEach(item => {
                if (item.type === 'folder') {
                    const folderDiv = document.createElement('div');
                    folderDiv.className = 'file-item';
                    folderDiv.innerHTML = `<strong>${prefix}${item.name}/</strong>`;
                    container.appendChild(folderDiv);
                    if (item.children && item.children.length > 0) {
                        displayFiles(item.children, container, prefix + '  ');
                    }
                } else {
                    const fileDiv = document.createElement('div');
                    fileDiv.className = 'file-item';
                    fileDiv.innerHTML = `
                        ${prefix}${item.name}
                        <a href="${item.webViewLink}" target="_blank">View</a>
                        <a href="${item.webContentLink}" download>Download</a>
                    `;
                    container.appendChild(fileDiv);
                }
            });
        }

        // Main function to load and display files
        async function loadFiles() {
            const statusDiv = document.getElementById('status');
            const fileListDiv = document.getElementById('file-list');

            try {
                statusDiv.textContent = 'Loading files...';
                const tree = await buildFolderTree(ROOT_FOLDER_ID);
                statusDiv.textContent = 'Files loaded successfully!';
                displayFiles(tree, fileListDiv);
            } catch (error) {
                statusDiv.className = 'error';
                statusDiv.textContent = `Error loading files: ${error.message}`;
                console.error('Error:', error);
            }
        }

        // Load files when the page loads
        window.onload = loadFiles;
    </script>
</body>
</html>
